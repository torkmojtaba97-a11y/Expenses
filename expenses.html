<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>Shared Expenses</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    /* تمام استایل‌های شما بدون تغییر */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f1f5f9;max-width:480px;margin:0 auto;min-height:100vh;color:#0f172a;overflow-x:hidden}
    button,input,select{font-family:inherit}
    .hd{background:linear-gradient(150deg,#0f172a,#1e293b);color:#fff;padding:16px 18px 22px;border-radius:0 0 24px 24px;position:relative}
    .hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .hd-top h1{font-size:17px;font-weight:800}
    .hd-btns{display:flex;gap:5px}
    .hd-btns button{background:rgba(255,255,255,.1);border:none;border-radius:8px;width:32px;height:32px;font-size:14px;cursor:pointer;color:#fff}
    .bal-box{text-align:center}
    .bal-lbl{font-size:9px;opacity:.45;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
    .bal-num{font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1}
    .bal-pos{color:#4ade80}.bal-neg{color:#f87171}
    .bal-stats{display:flex;justify-content:center;gap:20px;margin-top:10px}
    .bal-stat{text-align:center}
    .bal-stat .bs-lbl{font-size:8px;opacity:.4;text-transform:uppercase;letter-spacing:1px}
    .bal-stat .bs-val{font-size:15px;font-weight:700;margin-top:1px}
    .bs-green{color:#4ade80}.bs-red{color:#f87171}
    .nv{display:flex;gap:2px;padding:8px 14px 2px}
    .nv button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;border:none;border-radius:10px;background:transparent;cursor:pointer;color:#94a3b8;font-size:9px;font-weight:500}
    .nv button.on{background:#e2e8f0;color:#0f172a;font-weight:700}
    .ct{padding:6px 16px 105px}
    .sec{font-size:13px;font-weight:800;margin:14px 0 6px}
    .empty{text-align:center;padding:22px;color:#94a3b8;font-size:12px;background:#fff;border-radius:12px}
    .rw{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:10px 11px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .rw.inc-rw{border-left:3px solid #4ade80}
    .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .nfo{flex:1;min-width:0}.nfo .nm{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nfo .dt{font-size:9px;color:#94a3b8}.am{font-weight:800;font-size:13px}.am-g{color:#16a34a}.am-r{color:#dc2626}
    .ed-btn{background:none;border:none;font-size:12px;cursor:pointer;color:#cbd5e1;padding:3px 5px}
    .stats{display:flex;gap:5px;margin-bottom:5px}.st{flex:1;background:#fff;border-radius:12px;padding:9px 6px;text-align:center}.st .sl{font-size:9px;color:#94a3b8}.st .sv{font-size:15px;font-weight:900}
    .rc{background:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:8px}
    .rc .big{font-size:32px;font-weight:900;margin:3px 0}
    .br{margin-bottom:10px}.br .bh{display:flex;justify-content:space-between;font-size:12px}.br .bg{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden}.br .bf{height:100%;border-radius:4px}
    .wk{display:flex;align-items:flex-end;gap:3px;height:55px;margin:6px 0}.wk .bw{flex:1;display:flex;flex-direction:column;align-items:center}.wk .b{width:100%;border-radius:3px 3px 0 0;min-height:2px}
    .dr{background:#fff;border-radius:12px;padding:10px;margin-bottom:8px}.dr .drr{display:flex;gap:6px;align-items:center}
    select,.inp{border:2px solid #e2e8f0;border-radius:8px;padding:6px 8px;font-size:12px;background:#fff;width:100%}
    .cg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
    .cb{display:flex;flex-direction:column;align-items:center;padding:8px 2px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc}
    .fabs{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
    .fb{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}
    .fb-e{background:#0f172a}.fb-i{background:#16a34a}
    .ov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:20;display:flex;align-items:flex-end;justify-content:center}
    .md{background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 30px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
    .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;margin-top:10px;color:#fff}
    .btn-e{background:#0f172a}.btn-i{background:#16a34a}.btn-del{background:#fee2e2;color:#dc2626}
    .rcpt-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:2px dashed #e2e8f0;border-radius:10px;background:#f8fafc;cursor:pointer;font-size:12px;color:#64748b}
    .rcpt-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px}
    .sw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
    .scard{background:#fff;border-radius:20px;padding:30px 20px;text-align:center;width:100%}
  </style>
</head>
<body>
<div id="app"></div>

<script>
// --- بخش داده‌ها ---
var EC=[{id:"grocery",l:"Groceries",i:"🛒",c:"#16a34a"},{id:"food",l:"Food",i:"🍕",c:"#dc2626"},{id:"transport",l:"Transport",i:"🚗",c:"#2563eb"},{id:"bills",l:"Bills",i:"📄",c:"#7c3aed"},{id:"health",l:"Health",i:"💊",c:"#db2777"},{id:"clothes",l:"Clothing",i:"👕",c:"#0891b2"},{id:"fun",l:"Fun",i:"🎬",c:"#ea580c"},{id:"home",l:"Home",i:"🏠",c:"#92400e"},{id:"other",l:"Other",i:"📦",c:"#475569"}];
var IC=[{id:"salary",l:"Salary",i:"💼",c:"#16a34a"},{id:"commission",l:"Comm",i:"🤝",c:"#059669"},{id:"freelance",l:"Free",i:"💻",c:"#0d9488"},{id:"gift",l:"Gift",i:"🎁",c:"#7c3aed"},{id:"refund",l:"Refund",i:"↩️",c:"#2563eb"},{id:"other_inc",l:"Other",i:"💰",c:"#64748b"}];
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// --- توابع کمکی ---
function fmt(n){return "₱"+Math.round(Math.abs(n)).toLocaleString();}
function td(){return new Date().toISOString().slice(0,10);}
function mk(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function gc(id){var a=EC.concat(IC);for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return EC[8];}

// --- وضعیت برنامه ---
var S={
  url:localStorage.getItem("ex_url")||"",
  connected:false,
  data:[],
  pending: JSON.parse(localStorage.getItem("ex_pending")) || [],
  page:"home",
  modal:null,
  vm:mk(),
  form:{amount:"",cat:"grocery",desc:"",date:td()},
  incForm:{amount:"",cat:"salary",desc:"",date:td()},
  debtForm: {person: "", amount: "", type: "owe_me", desc: ""},
  editForm:{},
  syncing:false,
  status:"",
  search:"",
  fcat:"all",
  drFrom:"",drTo:"",
  openBal:num(localStorage.getItem("ex_openbal")),
  ocrStatus:"",
  ocrAmounts:[],
  ocrImg:null
};

// --- ارتباط با API ---
function api(p){
    var q=new URLSearchParams(p).toString();
    return fetch(S.url+"?"+q).then(function(r){return r.json();});
}

function load(){
  S.syncing=true; R();
  api({action:"get"}).then(function(r){
    if(r.ok){
        S.data=r.data;
        if(r.pending) S.pending = r.pending;
    }
    S.syncing=false; R();
  }).catch(function(){S.syncing=false; R();});
}

function conn(){
  if(!S.url.trim())return;
  S.status="testing"; R();
  api({action:"get"}).then(function(d){
    if(d.ok){S.status="ok";S.connected=true;S.data=d.data;if(d.pending) S.pending=d.pending;localStorage.setItem("ex_url",S.url.trim());}
    else S.status="fail"; R();
  }).catch(function(){S.status="fail"; R();});
}

// --- عملیات تراکنش ---
function addExp(){
  if(!S.form.amount)return;
  var e={id:Date.now().toString(36),amount:num(S.form.amount),category:S.form.cat,desc:S.form.desc,date:S.form.date,type:"expense"};
  S.data.push(e); S.form={amount:"",cat:"grocery",desc:"",date:td()}; S.modal=null; R();
  api({action:"add",...e}).catch(function(){});
}

function addInc(){
  if(!S.incForm.amount)return;
  var e={id:Date.now().toString(36),amount:num(S.incForm.amount),category:S.incForm.cat,desc:S.incForm.desc,date:S.incForm.date,type:"income"};
  S.data.push(e); S.incForm={amount:"",cat:"salary",desc:"",date:td()}; S.modal=null; R();
  api({action:"add",...e}).catch(function(){});
}

// --- عملیات بدهی (Pending) ---
function addDebt() {
    if(!S.debtForm.amount || !S.debtForm.person) return;
    var d = {id: Date.now().toString(36), person: S.debtForm.person, amount: num(S.debtForm.amount), type: S.debtForm.type, desc: S.debtForm.desc, date: td()};
    S.pending.push(d);
    S.debtForm = {person: "", amount: "", type: "owe_me", desc: ""};
    S.modal = null; R();
    api({action:"add_debt", ...d}).catch(function(){});
}

function settleDebt(id) {
    var idx = S.pending.findIndex(x => x.id === id);
    if(idx === -1) return;
    var d = S.pending[idx];
    api({action:"delete_debt", id:id}).catch(function(){});
    if(d.type === 'owe_me') {
        S.incForm = {amount: String(d.amount), cat: "other_inc", desc: "Settled: " + d.person, date: td()};
        addInc();
    } else {
        S.form = {amount: String(d.amount), cat: "other", desc: "Settled: " + d.person, date: td()};
        addExp();
    }
    S.pending.splice(idx, 1);
    R();
}

function delDebt(id) {
    if(!confirm("Delete?")) return;
    S.pending = S.pending.filter(x => x.id !== id);
    R();
    api({action:"delete_debt", id:id}).catch(function(){});
}

// --- اسکن رسید (OCR) ---
let cropper;
function scanReceipt(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const modal = document.createElement('div');
    modal.id = "ocr-modal";
    modal.setAttribute('style', 'position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;');
    modal.innerHTML = `<div style="padding:15px;display:flex;justify-content:space-between;color:#fff;">
      <button onclick="closeOcrModal()">Cancel</button><b>Crop Amount</b><button id="ocr-done">Done</button>
    </div><div style="flex:1;overflow:hidden;"><img id="crop-target" src="${e.target.result}" style="max-width:100%;"></div>`;
    document.body.appendChild(modal);
    cropper = new Cropper(document.getElementById('crop-target'), {viewMode:1});
    document.getElementById('ocr-done').onclick = function() {
      const dataUrl = cropper.getCroppedCanvas().toDataURL("image/jpeg");
      closeOcrModal();
      startOcr(dataUrl);
    };
  };
  reader.readAsDataURL(input.files[0]);
}
function closeOcrModal(){ if(cropper)cropper.destroy(); document.getElementById('ocr-modal')?.remove(); }
function startOcr(base64){
  S.ocrStatus="Scanning..."; R();
  Tesseract.recognize(base64, 'eng').then(res => {
    let num = res.data.text.replace(/[^0-9]/g, '');
    if(num.length > 2) {
      let val = parseFloat(num.slice(0,-2)+"."+num.slice(-2));
      S.ocrAmounts = [val]; S.ocrStatus = "Found: "+val;
    } else S.ocrStatus = "Failed. Crop closer.";
    R();
  });
}

// --- رندرینگ ---
function R(){
  var app=document.getElementById("app");
  if(!S.connected){
    app.innerHTML = `<div class="sw"><div class="scard"><h1>Shared Expenses</h1><input class="inp" id="ui" value="${S.url}" placeholder="URL"><button class="btn btn-e" onclick="S.url=document.getElementById('ui').value;conn()">Connect</button></div></div>`;
    return;
  }

  var tE=0, tI=0; S.data.forEach(e => { if(e.type==="income") tI+=num(e.amount); else tE+=num(e.amount); });
  var bal = S.openBal + tI - tE;

  var h = `<div class="hd">
    <div class="hd-top"><h1>Wallet</h1><div class="hd-btns"><button onclick="load()">${S.syncing?'...':'🔄'}</button></div></div>
    <div class="bal-box"><div class="bal-lbl">BALANCE</div><div class="bal-num">${fmt(bal)}</div></div>
  </div>
  <div class="nv">
    <button class="${S.page==='home'?'on':''}" onclick="S.page='home';R()">Home</button>
    <button class="${S.page==='report'?'on':''}" onclick="S.page='report';R()">Report</button>
    <button class="${S.page==='history'?'on':''}" onclick="S.page='history';R()">History</button>
  </div><div class="ct">`;

  if(S.page==="home"){
    h += `<div class="sec">Pending Debts</div>`;
    if(!S.pending.length) h += `<div class="empty">No debts</div>`;
    S.pending.forEach(d => {
      h += `<div class="rw" style="border-left:3px solid ${d.type==='owe_me'?'#4ade80':'#f87171'}">
        <div class="nfo"><b>${d.person}</b><br><small>${d.desc||''}</small></div>
        <div class="am">${fmt(d.amount)}</div>
        <button class="ed-btn" onclick="settleDebt('${d.id}')">✅</button>
        <button class="ed-btn" onclick="delDebt('${d.id}')">🗑️</button>
      </div>`;
    });
  } else if(S.page==="history"){
    S.data.slice().reverse().forEach(e => {
      var c = gc(e.category);
      h += `<div class="rw ${e.type==='income'?'inc-rw':''}">
        <div class="ic">${c.i}</div>
        <div class="nfo"><b>${e.desc||c.l}</b><br><small>${e.date}</small></div>
        <div class="am ${e.type==='income'?'am-g':'am-r'}">${fmt(e.amount)}</div>
      </div>`;
    });
  } else {
    h += `<div class="rc"><div class="big">${fmt(tI-tE)}</div><p>Monthly Net</p></div>`;
  }

  h += `</div><div class="fabs">
    <button class="fb fb-i" onclick="S.modal='inc';R()">+</button>
    <button class="fb fb-e" onclick="S.modal='exp';R()">-</button>
    <button class="fb" style="background:#7c3aed" onclick="S.modal='debt';R()">🤝</button>
  </div>`;

  if(S.modal){
    h += `<div class="ov"><div class="md"><h3>${S.modal}</h3>
      <input class="inp" type="number" placeholder="Amount" oninput="if(S.modal==='inc')S.incForm.amount=this.value; else if(S.modal==='debt')S.debtForm.amount=this.value; else S.form.amount=this.value">
      ${S.modal==='debt'?'<input class="inp" placeholder="Person" oninput="S.debtForm.person=this.value">':''}
      <button class="btn btn-e" onclick="if(S.modal==='inc')addInc(); else if(S.modal==='debt')addDebt(); else addExp()">Save</button>
      <button class="btn btn-del" onclick="S.modal=null;R()">Close</button></div></div>`;
  }
  app.innerHTML = h;
}
R(); if(S.url) conn();
</script>
</body>
</html>
