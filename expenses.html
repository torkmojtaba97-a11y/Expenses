<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Fulo — Money Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);max-width:480px;margin:0 auto;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch}
:root{--bg:#f0f4fb;--bg2:#ffffff;--bg3:#e8edf7;--card:#ffffff;--card2:#f5f7ff;--border:#dde3f0;--border2:#c8d0e5;--txt:#18243e;--txt2:#4e6080;--txt3:#8fa0be;--green:#00a070;--green2:#007a55;--green-dim:#00a07012;--red:#d93060;--red-dim:#d9306010;--gold:#d49a10;--blue:#2f6be0;--radius:16px;--shadow:0 2px 16px rgba(20,40,100,.07);--header-bg:#ffffff;--nav-bg:#ffffff}
[data-theme="dark"]{--bg:#0f1420;--bg2:#151d2e;--bg3:#1a2338;--card:#1e2840;--card2:#243050;--border:#2a3a58;--border2:#304565;--txt:#dce8ff;--txt2:#7a93bc;--txt3:#445c80;--green:#00cc84;--green2:#00aa6e;--green-dim:#00cc8414;--red:#ff4d72;--red-dim:#ff4d7214;--gold:#f5c542;--blue:#5b8ef5;--shadow:0 8px 32px rgba(0,0,0,.4);--header-bg:#151d2e;--nav-bg:#0f1420}
button,input,select{font-family:'Nunito',sans-serif;-webkit-user-select:none;user-select:none}
#app{position:relative;z-index:1}
.sw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 24px;width:100%;box-shadow:var(--shadow);text-align:center}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.scard h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:900;margin-bottom:4px;color:var(--txt)}
.scard .sub{font-size:12px;color:var(--txt3);line-height:1.7;margin-bottom:20px}
.inp-url{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:13px 16px;color:var(--txt);font-size:13px;outline:none;margin-bottom:10px}
.inp-url:focus{border-color:var(--green)}
.btn-connect{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--blue));border:none;border-radius:12px;color:#080c14;font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.hd{background:var(--header-bg);padding:16px 20px 0;position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border)}
.hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.hd-brand{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:900;color:var(--blue)}
.hd-acts{display:flex;gap:6px}
.hd-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:var(--txt2);transition:all .2s}
.hd-btn:active{border-color:var(--green);color:var(--green)}
.bal-card{background:linear-gradient(145deg,var(--blue) 0%,#1a4db8 100%);border-radius:20px;padding:22px 20px;margin:14px 16px 8px;position:relative;overflow:hidden;color:#fff}
.bal-label{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase;font-weight:500;margin-bottom:6px}
.bal-amount{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:16px;color:#fff}
.nv{display:flex;gap:2px;padding:6px 12px 4px;background:var(--nav-bg);position:sticky;top:0;z-index:4;border-bottom:1px solid var(--border);overflow-x:auto}
.nv-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;border-radius:12px;background:transparent;cursor:pointer;color:var(--txt3);font-size:9px;font-weight:500}
.nv-btn.on{background:var(--card);color:var(--green);border:1px solid var(--border)}
.ct{padding:6px 16px 120px}
.sec{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:800;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;margin:18px 0 8px}
.empty{text-align:center;padding:28px;color:var(--txt3);font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.rw{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:6px}
.ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nfo{flex:1;min-width:0}
.nfo .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.nfo .dt{font-size:10px;color:var(--txt3);margin-top:2px}
.am{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
.am-g{color:var(--green)}.am-r{color:var(--red)}
.ed-btn{background:none;border:none;font-size:13px;cursor:pointer;color:var(--txt3);padding:4px;border-radius:6px}
.stats{display:flex;gap:6px;margin-bottom:8px}
.st{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.sl{font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
.sv{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-top:3px}
.debt-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.debt-card.owe-me{border-left:3px solid var(--green)}
.debt-card.owe-them{border-left:3px solid var(--red)}
.dc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px}
.dc-left{display:flex;align-items:center;gap:10px;flex:1}
.dc-ic{width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dc-name{font-weight:700;font-size:14px}
.dc-desc{font-size:10px;color:var(--txt3);margin-top:2px}
.dc-right{text-align:right;flex-shrink:0}
.dc-remaining{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;line-height:1}
.dc-orig{font-size:10px;color:var(--txt3);margin-top:2px}
.dc-prog-wrap{margin-bottom:10px}
.dc-prog-bar{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.dc-prog-fill{height:100%;border-radius:4px}
.dc-prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3)}
.dc-history{background:var(--bg3);border-radius:10px;padding:8px 10px;margin-bottom:10px;max-height:150px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dc-pay-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)}
.dc-pay-row:last-child{border-bottom:none}
.dc-pay-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dc-pay-date{color:var(--txt3);min-width:60px;font-size:10px}
.dc-pay-note{flex:1;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.dc-pay-amt{font-weight:700;font-family:'Space Grotesk',sans-serif;margin-left:auto;white-space:nowrap}
.dc-actions{display:flex;gap:6px;flex-wrap:wrap}
.dc-btn{flex:1;min-width:50px;padding:8px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.dc-btn:active{transform:scale(.97)}
.fabs{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
.fab{display:flex;align-items:center;gap:8px;padding:0 20px;height:52px;border-radius:26px;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:800;color:#080c14;transition:transform .1s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.fab:active{transform:scale(.95)}
.fab-e{background:linear-gradient(135deg,#ff5c7a,#ff2d55)}
.fab-i{background:linear-gradient(135deg,var(--green),var(--blue))}
.ov{position:fixed;inset:0;background:rgba(8,12,20,.8);backdrop-filter:blur(8px);z-index:20;display:flex;align-items:flex-end;justify-content:center}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.md-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.md-h h3{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:900}
.md-close{background:var(--card);border:1px solid var(--border);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--txt2);flex-shrink:0}
.lb{display:block;font-size:9px;font-weight:700;color:var(--txt3);margin:14px 0 5px;text-transform:uppercase;letter-spacing:1px}
.inp-big{width:100%;background:var(--bg3);border:2px solid var(--border2);border-radius:14px;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;text-align:center;color:var(--txt);outline:none}
.inp-big:focus{border-color:var(--green)}
.inp-sm{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:11px 14px;color:var(--txt);font-size:13px;outline:none}
.inp-sm:focus{border-color:var(--green)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-family:'Space Grotesk',sans-serif;font-weight:800;cursor:pointer;margin-top:12px;transition:all .15s;letter-spacing:.5px}
.btn:active{transform:scale(.98)}
.btn-e{background:linear-gradient(135deg,var(--red),#ff2d55);color:#fff}
.btn-i{background:linear-gradient(135deg,var(--green),var(--blue));color:#080c14}
.btn-del{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,92,122,.2);margin-top:8px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);transition:all .15s}
.cb.sel{border-color:var(--green);background:var(--green-dim)}
.cb.sel .cl{color:var(--green)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--txt);box-shadow:var(--shadow);z-index:50;opacity:0;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
var EC=[{id:"grocery",l:"Groceries",i:"🛒",c:"#00e5a0"},{id:"food",l:"Food & Dining",i:"🍜",c:"#ff5c7a"},{id:"transport",l:"Transport",i:"🚗",c:"#4f8ef7"},{id:"bills",l:"Bills & Utilities",i:"📄",c:"#a78bfa"},{id:"health",l:"Health",i:"💊",c:"#fb7185"},{id:"clothes",l:"Clothing",i:"👕",c:"#22d3ee"},{id:"fun",l:"Entertainment",i:"🎬",c:"#fb923c"},{id:"home",l:"Home",i:"🏠",c:"#fbbf24"},{id:"other",l:"Other",i:"📦",c:"#94a3b8"}];
var IC=[{id:"salary",l:"Salary",i:"💼",c:"#00e5a0"},{id:"commission",l:"Commission",i:"🤝",c:"#4f8ef7"},{id:"freelance",l:"Freelance",i:"💻",c:"#22d3ee"},{id:"gift",l:"Gift",i:"🎁",c:"#a78bfa"},{id:"refund",l:"Refund",i:"↩️",c:"#4f8ef7"},{id:"other_inc",l:"Other",i:"💰",c:"#94a3b8"}];
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function fmt(n){n=Number(n)||0;return "₱"+Math.round(Math.abs(n)).toLocaleString();}
function td(){return new Date().toISOString().slice(0,10);}
function mk(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function gc(id){var a=EC.concat(IC);for(var i=0;i<a.length;i++){if(a[i].id===id)return a[i];}return EC[8];}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function toast(msg){var el=document.getElementById("toast");if(!el)return;el.textContent=msg;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},2000);}

var S={url:localStorage.getItem("ex_url")||"",connected:false,data:[],page:"home",modal:null,vm:mk(),form:{amount:"",cat:"grocery",desc:"",date:td()},incForm:{amount:"",cat:"salary",desc:"",date:td()},editForm:{},debtForm:{person:"",amount:"",type:"owe_me",desc:""},editDebtForm:{id:"",person:"",type:"",desc:"",payments:[]},status:"",syncing:false,search:"",fcat:"all",openBal:num(localStorage.getItem("ex_openbal")),showScript:false,pending:JSON.parse(localStorage.getItem("ex_pending")||"[]"),darkMode:localStorage.getItem("ex_theme")==="dark",partialForm:{id:"",amount:"",note:"",date:""},addToDebtForm:{id:"",amount:"",note:"",date:"",applyNow:false}};

function applyTheme(){document.documentElement.setAttribute("data-theme",S.darkMode?"dark":"light");}
function toggleTheme(){S.darkMode=!S.darkMode;localStorage.setItem("ex_theme",S.darkMode?"dark":"light");applyTheme();R();}
applyTheme();

function getE(){return S.data.filter(function(d){return d.type!=="income";});}
function getI(){return S.data.filter(function(d){return d.type==="income";});}
function tot(arr){var s=0;for(var i=0;i<arr.length;i++)s+=num(arr[i].amount);return s;}

function api(p){var q=new URLSearchParams(p).toString();return fetch(S.url+"?"+q).then(function(r){return r.json();});}
function load(){S.syncing=true;R();api({action:"get"}).then(function(r){if(r.ok){S.data=r.data||[];if(Array.isArray(r.pending)){S.pending=r.pending.map(function(d){d.amount=num(d.amount);d.remaining=d.remaining!==undefined?num(d.remaining):d.amount;d.payments=Array.isArray(d.payments)?d.payments:[];return d;});localStorage.setItem("ex_pending",JSON.stringify(S.pending));}}S.syncing=false;R();toast("✓ Synced");}).catch(function(){S.syncing=false;R();toast("Sync failed ⚠");});}
function conn(){if(!S.url.trim())return;S.status="testing";R();fetch(S.url.trim()+"?action=get").then(function(r){return r.json();}).then(function(d){if(d.ok){S.status="ok";S.connected=true;load();localStorage.setItem("ex_url",S.url.trim());toast("Connected! 🎉");}else S.status="fail";R();}).catch(function(){S.status="fail";R();});}

function addExp(){var f=S.form;if(!f.amount)return;var e={id:uid(),amount:num(f.amount),category:f.cat,desc:f.desc,date:f.date,ts:Date.now(),type:"expense"};S.data.push(e);S.form={amount:"",cat:"grocery",desc:"",date:td()};S.modal=null;R();toast("Expense added ✓");api({action:"add",id:e.id,amount:e.amount,category:e.category,desc:e.desc,date:e.date,type:"expense"}).catch(function(){});}
function addInc(){var f=S.incForm;if(!f.amount)return;var e={id:uid(),amount:num(f.amount),category:f.cat,desc:f.desc,date:f.date,ts:Date.now(),type:"income"};S.data.push(e);S.incForm={amount:"",cat:"salary",desc:"",date:td()};S.modal=null;R();toast("Income added ✓");api({action:"add",id:e.id,amount:e.amount,category:e.category,desc:e.desc,date:e.date,type:"income"}).catch(function(){});}

function addDebt(){var f=S.debtForm;if(!f.amount||!f.person)return;var orig=num(f.amount);var d={id:uid(),person:f.person,amount:orig,remaining:orig,type:f.type,desc:f.desc,date:td(),payments:[{amount:orig,date:td(),note:"Initial debt",applied:false}]};S.pending.push(d);localStorage.setItem("ex_pending",JSON.stringify(S.pending));S.debtForm={person:"",amount:"",type:"owe_me",desc:""};S.modal=null;R();toast("Debt logged ✓");api({action:"add_debt",id:d.id,person:d.person,amount:d.amount,type:d.type,desc:d.desc,date:d.date,remaining:d.remaining,payments:JSON.stringify(d.payments)}).catch(function(){});}

function openEditDebt(id){var idx=S.pending.findIndex(function(x){return x.id===id;});if(idx===-1)return;var d=S.pending[idx];S.editDebtForm={id:id,person:d.person,type:d.type,desc:d.desc,payments:d.payments||[]};S.modal="editdebt";R();}

function updateDebtPayment(){var inps=document.querySelectorAll('.md input');var newAmount=num(inps[0].value);var f=S.editDebtForm;var idx=S.pending.findIndex(function(x){return x.id===f.id;});if(idx===-1)return;var d=S.pending[idx];var existing=f.payments.reduce(function(sum,p){return sum+num(p.amount);},0);d.amount=newAmount;d.remaining=Math.max(0,newAmount-existing);d.person=inps.length>1?inps[1].value:f.person;d.desc=inps.length>2?inps[2].value:f.desc;localStorage.setItem("ex_pending",JSON.stringify(S.pending));S.modal=null;R();toast("Debt updated ✓");api({action:"update_debt",id:d.id,remaining:d.remaining,payments:JSON.stringify(d.payments)}).catch(function(){});}

function openPartialPay(id){S.partialForm={id:id,amount:"",note:"",date:td()};S.modal="partial";R();}

function addPartialPay(){var f=S.partialForm;if(!f.amount)return;var idx=S.pending.findIndex(function(x){return x.id===f.id;});if(idx===-1)return;var d=S.pending[idx];var paid=num(f.amount);if(paid<=0||paid>d.remaining)paid=Math.min(paid,d.remaining);d.payments=d.payments||[];d.payments.push({amount:paid,date:f.date||td(),note:f.note||"Payment",applied:false});d.remaining=Math.max(0,d.remaining-paid);localStorage.setItem("ex_pending",JSON.stringify(S.pending));S.modal=null;S.partialForm={id:"",amount:"",note:"",date:""};R();toast("Payment recorded ✓");api({action:"update_debt",id:d.id,remaining:d.remaining,payments:JSON.stringify(d.payments)}).catch(function(){});}

function settleDebt(id){var idx=S.pending.findIndex(function(x){return x.id===id;});if(idx===-1)return;S.pending.splice(idx,1);localStorage.setItem("ex_pending",JSON.stringify(S.pending));S.modal=null;R();toast("Debt settled ✓");api({action:"delete_debt",id:id}).catch(function(){});}

function delDebt(id){if(!confirm("Delete this debt?"))return;S.pending=S.pending.filter(function(x){return x.id!==id;});localStorage.setItem("ex_pending",JSON.stringify(S.pending));R();toast("Deleted");api({action:"delete_debt",id:id}).catch(function(){});}

var _rt=null;
function R(){if(_rt)return;_rt=setTimeout(function(){_rt=null;doRender();},16);}

function doRender(){
  var app=document.getElementById("app");
  
  if(!S.connected){
    var h='<div class="sw"><div class="scard"><div class="logo-icon">💰</div><h1>Fulo</h1><p class="sub">Money Tracker</p><input class="inp-url" id="ui" placeholder="Paste Apps Script URL" value="'+S.url+'"><button class="btn-connect" onclick="S.url=document.getElementById(\'ui\').value;conn()">'+(S.status==="testing"?"Connecting…":"Connect")+'</button>';
    if(S.status==="fail")h+='<p style="color:var(--red);font-size:11px;margin-top:8px">Connection failed</p>';
    h+='</div></div>';
    app.innerHTML=h;return;
  }

  var tI=tot(getI()),tE=tot(getE()),bal=S.openBal+tI-tE;
  var h=S.syncing?'<div style="position:fixed;top:0;left:50%;width:100%;max-width:480px;height:2px;background:linear-gradient(90deg,var(--green),var(--blue));z-index:30;transform:translateX(-50%)"></div>':'';
  h+='<div class="hd"><div class="hd-top"><span class="hd-brand">Fulo</span><div class="hd-acts"><button class="hd-btn" onclick="toggleTheme()">'+(S.darkMode?'☀️':'🌙')+'</button><button class="hd-btn" onclick="load()">🔄</button></div></div>';
  h+='<div class="bal-card"><div class="bal-label">Balance</div><div class="bal-amount" style="color:'+(bal>=0?'#fff':'#ffcdd9')+'">'+(bal>=0?'+':'-')+fmt(Math.abs(bal))+'</div></div></div>';
  
  h+='<div class="nv">';
  ['home','debts','settings'].forEach(function(p){
    var icons={home:'🏠',debts:'🤝',settings:'⚙️'};
    h+='<button class="nv-btn'+(S.page===p?' on':'')+'" onclick="S.page=\''+p+'\';R()">'+icons[p]+'</button>';
  });
  h+='</div>';

  var content="";
  
  if(S.page==="home"){
    var today=S.data.filter(function(e){return e.date===td();});
    var thisMonth=S.data.filter(function(e){return e.date&&e.date.indexOf(S.vm)===0;});
    var mE=tot(thisMonth.filter(function(e){return e.type!=="income";}));
    var mI=tot(thisMonth.filter(function(e){return e.type==="income";}));
    
    content='<div class="sec">Today</div>';
    if(!today.length){content+='<div class="empty">No entries</div>';}
    else{today.sort(function(a,b){return(b.ts||0)-(a.ts||0);});today.forEach(function(e){content+='<div class="rw"><div class="ic" style="background:'+gc(e.category).c+'18">'+gc(e.category).i+'</div><div class="nfo"><div class="nm">'+(e.desc||gc(e.category).l)+'</div></div><div class="am '+(e.type==="income"?"am-g":"am-r")+'">'+(e.type==="income"?"+":"-")+fmt(e.amount)+'</div></div>';});}
    
    content+='<div class="sec">This Month</div>';
    content+='<div class="stats"><div class="st"><div class="sl">Income</div><div class="sv" style="color:var(--green)">'+fmt(mI)+'</div></div><div class="st"><div class="sl">Spent</div><div class="sv" style="color:var(--red)">'+fmt(mE)+'</div></div><div class="st"><div class="sl">Saved</div><div class="sv">'+fmt(mI-mE)+'</div></div></div>';
  }
  
  else if(S.page==="debts"){
    var oweMe=S.pending.filter(function(d){return d.type==="owe_me";});
    var oweThem=S.pending.filter(function(d){return d.type==="owe_them";});
    var totOMe=0;oweMe.forEach(function(d){totOMe+=num(d.remaining||d.amount);});
    var totOTh=0;oweThem.forEach(function(d){totOTh+=num(d.remaining||d.amount);});
    
    content='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"><div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--txt3)">Owe Me</div><div style="font-family:Space Grotesk;font-size:20px;font-weight:800;color:var(--green)">'+fmt(totOMe)+'</div></div><div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--txt3)">I Owe</div><div style="font-family:Space Grotesk;font-size:20px;font-weight:800;color:var(--red)">'+fmt(totOTh)+'</div></div></div>';
    
    if(oweMe.length){content+='<div class="sec">They owe me</div>';oweMe.forEach(function(d){content+=mkDebtCard(d);});}
    if(oweThem.length){content+='<div class="sec">I owe them</div>';oweThem.forEach(function(d){content+=mkDebtCard(d);});}
    if(!S.pending.length){content+='<div class="empty">No debts</div>';}
  }
  
  else if(S.page==="settings"){
    content='<div class="sec">Settings</div><div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px">Opening Balance</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">Starting amount</div></div><input type="number" value="'+S.openBal+'" onchange="S.openBal=num(this.value);localStorage.setItem(\'ex_openbal\',S.openBal)" style="width:100px;padding:8px;border:1px solid var(--border);border-radius:8px;text-align:right"></div></div>';
  }
  
  h+='<div class="ct">'+content+'</div>';
  
  if(S.page==="debts"){h+='<div class="fabs"><button class="fab fab-i" onclick="S.modal=\'debt\';R()"><span>＋</span>Add</button></div>';}
  else if(S.page==="home"){h+='<div class="fabs"><button class="fab fab-e" onclick="S.modal=\'exp\';R()"><span>＋</span>Exp</button><button class="fab fab-i" onclick="S.modal=\'inc\';R()"><span>＋</span>Inc</button></div>';}
  
  if(S.modal){
    var md="";
    if(S.modal==="exp"){
      md='<div class="md-h"><h3>Add Expense</h3><button class="md-close" onclick="S.modal=null;R()">✕</button></div><input class="inp-big" type="number" inputmode="decimal" placeholder="0" value="'+S.form.amount+'" oninput="S.form.amount=this.value"><label class="lb">Category</label><div class="cg">';
      EC.forEach(function(c){md+='<button class="cb'+(S.form.cat===c.id?" sel":"")+'" onclick="S.form.cat=\''+c.id+'\';R()">'+c.i+'<br><span style="font-size:8px">'+c.l+'</span></button>';});
      md+='</div><label class="lb">Note</label><input class="inp-sm" type="text" placeholder="What for?" value="'+S.form.desc+'" oninput="S.form.desc=this.value"><label class="lb">Date</label><input class="inp-sm" type="date" value="'+S.form.date+'" onchange="S.form.date=this.value"><button class="btn btn-e" onclick="addExp()">Save</button>';
    }
    else if(S.modal==="inc"){
      md='<div class="md-h"><h3>Add Income</h3><button class="md-close" onclick="S.modal=null;R()">✕</button></div><input class="inp-big" type="number" inputmode="decimal" placeholder="0" value="'+S.incForm.amount+'" oninput="S.incForm.amount=this.value"><label class="lb">Category</label><div class="cg">';
      IC.forEach(function(c){md+='<button class="cb'+(S.incForm.cat===c.id?" sel":"")+'" onclick="S.incForm.cat=\''+c.id+'\';R()">'+c.i+'<br><span style="font-size:8px">'+c.l+'</span></button>';});
      md+='</div><label class="lb">Source</label><input class="inp-sm" type="text" placeholder="Details" value="'+S.incForm.desc+'" oninput="S.incForm.desc=this.value"><label class="lb">Date</label><input class="inp-sm" type="date" value="'+S.incForm.date+'" onchange="S.incForm.date=this.value"><button class="btn btn-i" onclick="addInc()">Save</button>';
    }
    else if(S.modal==="debt"){
      md='<div class="md-h"><h3>New Debt</h3><button class="md-close" onclick="S.modal=null;R()">✕</button></div><label class="lb">Type</label><div class="stats" style="margin-bottom:0"><button class="st" style="border:'+(S.debtForm.type==="owe_me"?'2px':'1px')+' solid;background:'+(S.debtForm.type==="owe_me"?'var(--green-dim)':'var(--bg3)')+'" onclick="S.debtForm.type=\'owe_me\';R()"><div>🤝</div><div style="font-size:12px">They owe me</div></button><button class="st" style="border:'+(S.debtForm.type==="owe_them"?'2px':'1px')+' solid;background:'+(S.debtForm.type==="owe_them"?'var(--red-dim)':'var(--bg3)')+'" onclick="S.debtForm.type=\'owe_them\';R()"><div>💸</div><div style="font-size:12px">I owe them</div></button></div><label class="lb">Person</label><input class="inp-sm" type="text" placeholder="Name" value="'+S.debtForm.person+'" oninput="S.debtForm.person=this.value"><label class="lb">Amount</label><input class="inp-big" type="number" inputmode="decimal" placeholder="0" value="'+S.debtForm.amount+'" oninput="S.debtForm.amount=this.value"><label class="lb">Note</label><input class="inp-sm" type="text" placeholder="Details" value="'+S.debtForm.desc+'" oninput="S.debtForm.desc=this.value"><button class="btn btn-i" onclick="addDebt()">Save</button>';
    }
    else if(S.modal==="editdebt"){
      var pd=S.pending.find(function(x){return x.id===S.editDebtForm.id;});
      if(pd){
        md='<div class="md-h"><h3>Edit Debt - '+pd.person+'</h3><button class="md-close" onclick="S.modal=null;R()">✕</button></div>';
        md+='<label class="lb">Total Amount</label><input class="inp-big" type="number" inputmode="decimal" placeholder="0" value="'+pd.amount+'" oninput="this.dataset.val=this.value"><label class="lb">Payment History</label><div class="dc-history">';
        (pd.payments||[]).forEach(function(p){md+='<div class="dc-pay-row"><span class="dc-pay-dot" style="background:'+(p.amount>0?'var(--green)':'var(--red)')+'"></span><div style="flex:1"><div style="font-size:10px;color:var(--txt3)">'+p.date+'</div><div style="font-size:11px">'+p.note+'</div></div><div style="font-family:Space Grotesk;font-weight:800">'+fmt(p.amount)+'</div></div>';});
        md+='</div><label class="lb">Name</label><input class="inp-sm" type="text" value="'+pd.person+'" oninput="S.editDebtForm.person=this.value"><label class="lb">Note</label><input class="inp-sm" type="text" value="'+pd.desc+'" oninput="S.editDebtForm.desc=this.value"><button class="btn btn-i" onclick="updateDebtPayment()">Update</button><button class="btn btn-del" onclick="delDebt(\''+pd.id+'\')">Delete Debt</button>';
      }
    }
    else if(S.modal==="partial"){
      var pd=S.pending.find(function(x){return x.id===S.partialForm.id;});
      if(pd){
        md='<div class="md-h"><h3>Record Payment</h3><button class="md-close" onclick="S.modal=null;R()">✕</button></div><div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:12px"><div style="font-size:10px;color:var(--txt3)">Remaining</div><div style="font-family:Space Grotesk;font-size:24px;font-weight:800">'+fmt(pd.remaining)+'</div><div style="font-size:12px;margin-top:4px">'+pd.person+'</div></div><label class="lb">Amount</label><input class="inp-big" type="number" inputmode="decimal" placeholder="0" value="'+S.partialForm.amount+'" oninput="S.partialForm.amount=this.value"><label class="lb">Date</label><input class="inp-sm" type="date" value="'+S.partialForm.date+'" onchange="S.partialForm.date=this.value"><label class="lb">Note</label><input class="inp-sm" type="text" placeholder="Optional" value="'+S.partialForm.note+'" oninput="S.partialForm.note=this.value"><button class="btn btn-i" onclick="addPartialPay()">Save Payment</button>';
      }
    }
    h+='<div class="ov" onclick="if(event.target===this){S.modal=null;R()}"><div class="md">'+md+'</div></div>';
  }
  
  app.innerHTML=h;
}

function mkDebtCard(d){
  var isCredit=d.type==="owe_me";
  var payments=d.payments||[];
  var card='<div class="debt-card '+(isCredit?"owe-me":"owe-them")+'">';
  card+='<div class="dc-head"><div class="dc-left"><div class="dc-ic">'+(isCredit?'🤝':'💸')+'</div><div><div class="dc-name">'+d.person+'</div>'+(d.desc?'<div class="dc-desc">'+d.desc+'</div>':'')+'</div></div><div class="dc-right"><button class="hd-btn" onclick="openEditDebt(\''+d.id+'\')">✏️</button></div></div>';
  
  card+='<div style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:10px"><div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Total / Remaining</div><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-family:Space Grotesk;font-size:18px;font-weight:800">'+fmt(d.remaining)+'</div><div style="text-align:right"><div style="font-size:10px;color:var(--txt3)">of</div><div style="font-family:Space Grotesk;font-size:14px;font-weight:700">'+fmt(d.amount)+'</div></div></div></div>';
  
  if(payments.length){
    card+='<div class="dc-history">';
    payments.forEach(function(p){
      card+='<div class="dc-pay-row"><span class="dc-pay-dot" style="background:var(--blue)"></span><span class="dc-pay-date">'+p.date+'</span><span class="dc-pay-note">'+p.note+'</span><span class="dc-pay-amt">'+fmt(p.amount)+'</span></div>';
    });
    card+='</div>';
  }
  
  card+='<div class="dc-actions"><button class="dc-btn" onclick="openPartialPay(\''+d.id+'\')">💳 Pay</button><button class="dc-btn" onclick="settleDebt(\''+d.id+'\')">✅ Settle</button><button class="dc-btn" onclick="delDebt(\''+d.id+'\')">🗑</button></div>';
  card+='</div>';
  return card;
}

if(S.url&&localStorage.getItem("ex_url")){conn();}else{R();}
</script>
</body>
</html>
