<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Fulo — Money Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232f6be0' width='100' height='100' rx='20'/><text y='75' font-size='75'>💰</text></svg>">
  <style>
/* ── LIGHT MODE (default) ── */
:root{
  --bg:#f0f4fb;
  --bg2:#ffffff;
  --bg3:#e8edf7;
  --card:#ffffff;
  --card2:#f5f7ff;
  --border:#dde3f0;
  --border2:#c8d0e5;
  --txt:#18243e;
  --txt2:#4e6080;
  --txt3:#8fa0be;
  --green:#00a070;
  --green2:#007a55;
  --green-dim:#00a07012;
  --red:#d93060;
  --red-dim:#d9306010;
  --gold:#d49a10;
  --blue:#2f6be0;
  --purple:#8b5cf6;
  --purple-dim:#8b5cf612;
  --radius:16px;
  --shadow:0 2px 16px rgba(20,40,100,.07);
  --header-bg:#ffffff;
  --nav-bg:#ffffff;
  --nav-shadow:0 -1px 0 #dde3f0;
}
/* ── DARK MODE ── */
[data-theme="dark"]{
  --bg:#0f1420;
  --bg2:#151d2e;
  --bg3:#1a2338;
  --card:#1e2840;
  --card2:#243050;
  --border:#2a3a58;
  --border2:#304565;
  --txt:#dce8ff;
  --txt2:#7a93bc;
  --txt3:#445c80;
  --green:#00cc84;
  --green2:#00aa6e;
  --green-dim:#00cc8414;
  --red:#ff4d72;
  --red-dim:#ff4d7214;
  --gold:#f5c542;
  --blue:#5b8ef5;
  --purple:#a78bfa;
  --purple-dim:#a78bfa14;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --header-bg:#151d2e;
  --nav-bg:#0f1420;
  --nav-shadow:0 -1px 0 #2a3a58;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--txt);
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body{transition:background .3s,color .3s}
[data-theme="dark"] body::before{
  content:'';
  position:fixed;
  top:-200px;right:-100px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(0,204,132,.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
[data-theme="dark"] body::after{
  content:'';
  position:fixed;
  bottom:-200px;left:-100px;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(91,142,245,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
button,input,select{font-family:'Nunito',sans-serif}
#app{position:relative;z-index:1}

/* ── CONNECT SCREEN ── */
.sw{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.scard{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px 24px;
  width:100%;
  box-shadow:var(--shadow);
  text-align:center;
}
.logo-icon{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  margin:0 auto 16px;
  box-shadow:0 8px 24px rgba(0,229,160,.25);
}
.scard h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:28px;font-weight:900;
  margin-bottom:4px;
  color:var(--txt);
}
.scard .sub{font-size:12px;color:var(--txt3);line-height:1.7;margin-bottom:20px}
.inp-url{
  width:100%;
  background:var(--bg3);
  border:1.5px solid var(--border2);
  border-radius:12px;
  padding:13px 16px;
  color:var(--txt);
  font-size:13px;
  outline:none;
  transition:border-color .2s;
  margin-bottom:10px;
}
.inp-url:focus{border-color:var(--green)}
.btn-connect{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  border:none;border-radius:12px;
  color:#080c14;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .15s,transform .1s;
  font-family:'Space Grotesk',sans-serif;
}
.btn-connect:active{transform:scale(.98);opacity:.9}
.err-msg{font-size:11px;color:var(--red);margin-top:8px}

.code-toggle{
  margin-top:16px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  font-size:11px;color:var(--txt2);
  cursor:pointer;text-align:left;
  width:100%;display:flex;justify-content:space-between;
}
.code-box{
  background:#050810;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;margin-top:8px;
  position:relative;text-align:left;
}
.code-box pre{
  color:#7dd3fc;font-size:8px;
  line-height:1.5;white-space:pre-wrap;
  word-break:break-all;max-height:130px;overflow:auto;
}
.code-box button{
  position:absolute;top:8px;right:8px;
  background:var(--card2);color:var(--txt);
  border:1px solid var(--border2);border-radius:6px;
  padding:4px 10px;font-size:10px;cursor:pointer;font-weight:600;
}
.code-note{font-size:9px;color:var(--txt3);line-height:1.6;margin-top:6px;text-align:left}

/* ── HEADER ── */
.hd{
  background:var(--header-bg);
  padding:16px 20px 0;
  position:sticky;top:0;z-index:5;
  border-bottom:1px solid var(--border);
  transition:background .3s;
}
.hd-top{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:20px;
}
.hd-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;font-weight:900;
  color:var(--blue);
}
.status-badge{
  font-size:10px;font-weight:700;
  padding:4px 9px;border-radius:10px;
  margin-left:8px;
  letter-spacing:.3px;
  white-space:nowrap;
  align-self:center;
}
.offline-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,92,122,.25)}
.queue-badge{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,92,246,.25);animation:pulseBadge 2s infinite}
@keyframes pulseBadge{0%,100%{opacity:.85}50%{opacity:1}}
.hd-top .hd-brand{flex:0 0 auto}
.hd-top{flex-wrap:nowrap}
.form-err{
  background:var(--red-dim);
  border:1px solid rgba(255,92,122,.25);
  color:var(--red);
  font-size:11px;font-weight:600;
  padding:9px 12px;border-radius:10px;
  margin-top:8px;
  display:flex;align-items:center;gap:6px;
}
.form-err::before{content:"⚠";font-size:12px}
.hd-acts{display:flex;gap:6px;margin-left:auto}
.hd-btn{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;color:var(--txt2);
  transition:border-color .2s,color .2s;
}
.hd-btn:active{border-color:var(--green);color:var(--green)}

/* ── BALANCE CARD ── */
.bal-card{
  background:linear-gradient(145deg,var(--blue) 0%,#1a4db8 100%);
  border-radius:20px;
  padding:22px 20px;
  margin:14px 16px 8px;
  position:relative;overflow:hidden;
  color:#fff;
  cursor:pointer;
  transition:transform .1s;
}
.bal-card:active{transform:scale(.98)}
.bal-card::before{
  content:'';
  position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
  pointer-events:none;
}
.bal-label{
  font-size:10px;color:rgba(255,255,255,.7);
  letter-spacing:2px;text-transform:uppercase;
  font-weight:500;margin-bottom:6px;
}
.bal-amount{
  font-family:'Space Grotesk',sans-serif;
  font-size:42px;font-weight:900;
  letter-spacing:-2px;line-height:1;
  margin-bottom:16px;color:#fff;
}
.bal-pos{color:#fff}.bal-neg{color:#ffcdd9}
.bal-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;
}
.bal-stat{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  border-radius:12px;padding:10px 12px;
}
.bs-label{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.bs-val{font-size:16px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#fff}
.bs-g{color:#a0ffd6}.bs-r{color:#ffb3c4}
.dep-line{
  margin-top:12px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.2);
  font-size:10px;color:rgba(255,255,255,.75);
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.dep-badge{
  background:rgba(255,255,255,.2);color:#fff;
  border-radius:6px;padding:2px 7px;font-size:9px;font-weight:600;
}

/* ── NAV ── */
.nv{
  display:flex;gap:2px;
  padding:6px 12px 4px;
  background:var(--nav-bg);
  position:sticky;top:0;z-index:4;
  border-bottom:1px solid var(--border);
  transition:background .3s;
}
.nv-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;
  padding:8px 4px;border:none;
  border-radius:12px;background:transparent;
  cursor:pointer;color:var(--txt3);
  font-size:9px;font-weight:500;
  transition:all .2s;
  letter-spacing:.3px;
}
.nv-btn i{font-size:18px;font-style:normal;transition:transform .2s}
.nv-btn.on{
  background:var(--card);
  color:var(--green);
  border:1px solid var(--border);
}
.nv-btn.on i{transform:scale(1.1)}

/* ── CONTENT ── */
.ct{padding:6px 16px 120px}
.sec{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:800;
  color:var(--txt2);letter-spacing:1px;
  text-transform:uppercase;
  margin:18px 0 8px;
}
.empty{
  text-align:center;padding:28px;
  color:var(--txt3);font-size:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.empty span{display:block;font-size:28px;margin-bottom:8px}

/* ── TRANSACTION ROW ── */
.rw{
  display:flex;align-items:center;gap:10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:11px 13px;
  margin-bottom:6px;
  transition:border-color .15s;
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rw:active{border-color:var(--border2)}
.rw.inc-rw{border-left:3px solid var(--green)}
.rw.exp-rw{border-left:3px solid transparent}
.ic{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.nfo{flex:1;min-width:0}
.nfo .nm{
  font-weight:600;font-size:13px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--txt);
}
.nfo .dt{font-size:10px;color:var(--txt3);margin-top:2px}
.am{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
.am-g{color:var(--green)}.am-r{color:var(--red)}
.ed-btn{
  background:none;border:none;
  font-size:13px;cursor:pointer;
  color:var(--txt3);padding:4px;
  border-radius:6px;transition:color .15s;
}
.ed-btn:active{color:var(--txt)}

/* ── STATS ROW ── */
.stats{display:flex;gap:6px;margin-bottom:8px}
.st{
  flex:1;background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;padding:12px 8px;
  text-align:center;
}
.sl{font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
.sv{
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:800;margin-top:3px;
}

/* ── CHART ── */
.chart-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 12px 10px;
  margin-bottom:8px;
}
.wk{display:flex;align-items:flex-end;gap:4px;height:60px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.b{
  width:100%;border-radius:4px 4px 0 0;
  min-height:3px;
  transition:height .4s cubic-bezier(.34,1.56,.64,1);
}
.bl{font-size:8px;color:var(--txt3)}
.bt{font-size:8px;color:var(--txt2);font-weight:600;margin-bottom:2px}

/* ── REPORT BARS ── */
.br-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;margin-bottom:6px;
}
.br-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.br-label{font-size:12px;font-weight:600}
.br-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:800}
.bg{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.bp{font-size:9px;color:var(--txt3);margin-top:3px}
.badge{
  font-size:8px;padding:2px 6px;border-radius:5px;
  font-weight:700;margin-left:4px;
}

/* ── REPORT SUMMARY ── */
.rc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;padding:20px;
  text-align:center;margin-bottom:10px;
}
.rc-label{font-size:10px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
.rc-big{
  font-family:'Space Grotesk',sans-serif;
  font-size:38px;font-weight:900;
  letter-spacing:-2px;margin:4px 0;
}
.rc-sub{display:flex;justify-content:center;gap:16px;font-size:12px;margin-top:4px}
.rc-meta{font-size:10px;color:var(--txt3);margin-top:4px}

/* ── DATE RANGE ── */
.dr{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px;margin-bottom:8px;
}
.dr-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.inp-date{
  flex:1;background:var(--bg3);
  border:1.5px solid var(--border2);
  border-radius:10px;padding:9px 10px;
  color:var(--txt);font-size:12px;
  outline:none;transition:border-color .2s;
}
.inp-date:focus{border-color:var(--green)}
.dr-sep{color:var(--txt3);font-size:11px}
.dr-result{
  background:var(--bg3);border-radius:10px;
  padding:12px;text-align:center;
}
.dr-bal{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;font-weight:900;
  margin:4px 0;
}
.dr-meta{font-size:10px;color:var(--txt3)}
.dr-hint{font-size:11px;color:var(--txt3);text-align:center;padding:8px}

/* ── DEBT CARDS ── */
.debt-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:14px;margin-bottom:10px;
}
.debt-card.owe-me{border-left:3px solid var(--green)}
.debt-card.owe-them{border-left:3px solid var(--red)}
.dc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.dc-left{display:flex;align-items:center;gap:10px}
.dc-ic{width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dc-name{font-weight:700;font-size:14px}
.dc-desc{font-size:10px;color:var(--txt3);margin-top:2px}
.dc-right{text-align:right;display:flex;align-items:flex-start;gap:8px}
.dc-remaining{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;line-height:1}
.dc-orig{font-size:10px;color:var(--txt3);margin-top:2px}

.dc-prog-wrap{margin-bottom:10px}
.dc-prog-bar{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.dc-prog-fill{height:100%;border-radius:4px;transition:width .4s ease;min-width:0}
.dc-prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3)}

.dc-history{
  background:var(--bg3);border-radius:10px;
  padding:8px 10px;margin-bottom:10px;
}
.dc-pay-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 0;font-size:11px;
  border-bottom:1px solid var(--border);
}
.dc-pay-row:last-child{border-bottom:none}
.dc-pay-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dc-pay-date{color:var(--txt3);min-width:70px}
.dc-pay-note{flex:1;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-pay-amt{font-weight:700;font-family:'Space Grotesk',sans-serif;margin-left:auto}

.dc-actions{display:flex;gap:6px}
.dc-btn{
  flex:1;padding:8px 6px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--bg3);color:var(--txt2);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;text-align:center;
}
.dc-btn:active{transform:scale(.97)}
.dc-btn-pay{flex:2}
.dc-btn-settle{flex:2;border-color:currentColor}
.dc-apply-btn{
  background:none;border:1px solid currentColor;border-radius:5px;
  padding:2px 6px;font-size:9px;font-weight:700;
  cursor:pointer;margin-left:4px;white-space:nowrap;
}
.dc-apply-btn:active{opacity:.7}
.dc-del-pay-btn{
  background:none;border:none;
  font-size:11px;cursor:pointer;
  color:var(--txt3);padding:2px 4px;
  margin-left:2px;
}
.dc-del-pay-btn:active{color:var(--red)}

/* ── HISTORY FILTERS ── */
.chips{
  display:flex;gap:4px;
  overflow-x:auto;padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  padding:6px 12px;border-radius:20px;
  font-size:10px;font-weight:600;
  border:1.5px solid var(--border2);
  background:var(--card);
  cursor:pointer;white-space:nowrap;
  color:var(--txt2);
  transition:all .15s;
}
.chip.on{background:var(--green);color:#080c14;border-color:var(--green)}
.chip.on-g{background:var(--green);color:#080c14;border-color:var(--green)}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{
  width:100%;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:10px 14px 10px 36px;
  color:var(--txt);font-size:13px;
  outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap::before{
  content:'🔍';font-size:13px;
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
}

/* ── SETTINGS ── */
.set-row{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:14px 0;
  border-bottom:1px solid var(--border);
}
.set-row:last-child{border-bottom:none}
.set-label{font-size:13px;font-weight:500}
.set-sub{font-size:10px;color:var(--txt3);margin-top:2px}
.set-inp{
  background:var(--bg3);
  border:1.5px solid var(--border2);
  border-radius:10px;
  padding:8px 12px;
  color:var(--txt);font-size:15px;
  font-weight:700;text-align:right;
  width:130px;outline:none;
  font-family:'Space Grotesk',sans-serif;
  transition:border-color .2s;
}
.set-inp:focus{border-color:var(--green)}
.set-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:0 14px;margin-bottom:10px;
}
.set-danger{
  background:var(--red-dim);border:1px solid rgba(255,92,122,.2);
  border-radius:12px;padding:12px 14px;

var SCRIPT='// ── Fulo Sync — set your token below ──\nvar TOKEN="CHANGE_ME_TO_A_LONG_RANDOM_STRING";\n\nfunction doGet(e){return handle(e)}\nfunction doPost(e){return handle(e)}\nfunction out(o){return ContentService.createTextOutput(JSON.stringify(o)).setMimeType(ContentService.MimeType.JSON)}\n\nfunction handle(e){\n  var p=(e&&e.parameter)||{};\n  if(!p.token||p.token!==TOKEN)return out({ok:false,error:"unauthorized"});\n\n  var ss=SpreadsheetApp.getActiveSpreadsheet();\n  var sh=ss.getSheetByName("Expenses")||ss.insertSheet("Expenses");\n  if(sh.getLastRow()===0)\n    sh.appendRow(["ID","Amount","Category","Desc","Date","Timestamp","Type","PM","GLDebit","GLCredit"]);\n  var dsh=ss.getSheetByName("Debts")||ss.insertSheet("Debts");\n  if(dsh.getLastRow()===0)\n    dsh.appendRow(["ID","Person","Amount","Type","Desc","Date","Remaining","Payments"]);\n\n  try{\n    if(p.action==="get"){\n      var d=sh.getDataRange().getValues(),tx=[];\n      for(var i=1;i<d.length;i++){\n        if(d[i][0])tx.push({id:d[i][0],amount:d[i][1],category:d[i][2],desc:d[i][3],date:d[i][4],ts:d[i][5],type:d[i][6]||"expense",pm:d[i][7]||"",gl_debit:d[i][8]||"",gl_credit:d[i][9]||""});\n      }\n      var dd=dsh.getDataRange().getValues(),dbt=[];\n      for(var j=1;j<dd.length;j++){\n        if(dd[j][0]){\n          var pays=[];try{pays=JSON.parse(dd[j][7]||"[]")}catch(err){pays=[]}\n          dbt.push({id:dd[j][0],person:dd[j][1],amount:parseFloat(dd[j][2])||0,type:dd[j][3],desc:dd[j][4]||"",date:dd[j][5],remaining:parseFloat(dd[j][6])||0,payments:pays});\n        }\n      }\n      return out({ok:true,data:tx,pending:dbt});\n    }\n    if(p.action==="add"){\n      sh.appendRow([p.id,parseFloat(p.amount),p.category,p.desc||"",p.date,Date.now(),p.type||"expense",p.pm||"",p.gl_debit||"",p.gl_credit||""]);\n      return out({ok:true});\n    }\n    if(p.action==="delete"){\n      var rows=sh.getDataRange().getValues();\n      for(var k=1;k<rows.length;k++){if(rows[k][0]===p.id){sh.deleteRow(k+1);break}}\n      return out({ok:true});\n    }\n    if(p.action==="add_debt"){\n      dsh.appendRow([p.id,p.person,parseFloat(p.amount),p.type,p.desc||"",p.date,parseFloat(p.remaining||p.amount),p.payments||"[]"]);\n      return out({ok:true});\n    }\n    if(p.action==="delete_debt"){\n      var drows=dsh.getDataRange().getValues();\n      for(var m=1;m<drows.length;m++){if(drows[m][0]===p.id){dsh.deleteRow(m+1);break}}\n      return out({ok:true});\n    }\n    if(p.action==="reset_all"){\n      if(sh.getLastRow()>1)sh.getRange(2,1,sh.getLastRow()-1,sh.getLastColumn()).clearContent();\n      if(dsh.getLastRow()>1)dsh.getRange(2,1,dsh.getLastRow()-1,dsh.getLastColumn()).clearContent();\n      return out({ok:true});\n    }\n    return out({ok:false,error:"unknown action"});\n  }catch(err){return out({ok:false,error:String(err)})}\n}';

// ─────────────────────────────────────────

function fmt(n){n=Number(n)||0;return "₱"+Math.round(Math.abs(n)).toLocaleString();}

function ts2t(ts){if(!ts)return"";var d=new Date(typeof ts==="number"?ts:parseInt(ts));if(isNaN(d.getTime()))return"";return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");}
function uid(){
  if(typeof crypto!=="undefined"&&crypto.randomUUID){return crypto.randomUUID();}
  // fallback: high-entropy (ts + 3 random segments)

    Math.random().toString(36).slice(2,10)+"-"+

// Robust copy — works on HTTP, old browsers, iOS Safari, etc.
function copyScript(btn){
  var text=SCRIPT;
  var done=function(){
    if(btn){btn.textContent="✓ Copied!";setTimeout(function(){btn.textContent="Copy";},1800);}
    toast("Copied to clipboard ✓");
  };
  var fail=function(){
    // last resort: show prompt so user can copy manually
    try{window.prompt("Copy the code below (Ctrl+C / Cmd+C):",text);}catch(e){}
    toast("Select and copy manually");
  };
  // Try modern API first (needs HTTPS or localhost)
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(done).catch(function(){legacyCopy(text,done,fail);});
  }else{
    legacyCopy(text,done,fail);
  }
}
function legacyCopy(text,done,fail){
  try{
    var ta=document.createElement("textarea");
    ta.value=text;
    ta.setAttribute("readonly","");
    ta.style.position="fixed";
    ta.style.top="0";ta.style.left="0";
    ta.style.opacity="0";
    document.body.appendChild(ta);
    // iOS needs this
    ta.focus();
    ta.select();
    ta.setSelectionRange(0,text.length);
    var ok=document.execCommand("copy");
    document.body.removeChild(ta);
    if(ok)done();else fail();
  }catch(e){fail();}
}

// recalculate remaining from payments
function recalcRemaining(d){
  var totalPaid=0;
  var totalAdded=0;
  (d.payments||[]).forEach(function(p){
    if(p.isAddition) totalAdded+=num(p.amount);
    else totalPaid+=num(p.amount);
  });
  // original amount = base amount (without additions)
  // d.amount already includes additions, so remaining = d.amount - totalPaid
  d.remaining=Math.max(0,d.amount-totalPaid);
}

function cleanData(arr){
  for(var i=0;i<arr.length;i++){
    arr[i].amount=num(arr[i].amount);

    if(!arr[i].type||arr[i].type==="undefined")arr[i].type="expense";

function validAmount(v){
  var n=parseFloat(v);
  if(isNaN(n))return "Please enter a valid number";
  if(n<=0)return "Amount must be greater than zero";
  if(n>1000000000)return "Amount is too large";
  return null;
}
function validDate(d){
  if(!d)return "Date is required";
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return "Invalid date format";
  var dt=new Date(d);
  if(isNaN(dt.getTime()))return "Invalid date";
  var today=new Date();today.setHours(23,59,59,999);
  if(dt>today)return "Date cannot be in the future";
  var min=new Date("2000-01-01");
  if(dt<min)return "Date is too old (before 2000)";
  return null;
}
function validText(v,max){
  if(v&&v.length>(max||200))return "Text is too long (max "+(max||200)+" chars)";
  return null;
}

// ─────────────────────────────────────────
//  API + OFFLINE QUEUE
// ─────────────────────────────────────────
function saveQueue(){localStorage.setItem("ex_syncq",JSON.stringify(S.syncQueue));}
function queueCount(){return S.syncQueue.length;}

// low-level fetch (no queueing)
function rawApi(p){
  var params=Object.assign({},p,{token:S.token||""});
  var q=new URLSearchParams(params).toString();
  return fetch(S.url+"?"+q,{method:"GET"})
    .then(function(r){
      if(!r.ok)throw new Error("http "+r.status);
      return r.json();
    })
    .then(function(j){
      if(j&&j.ok===false&&j.error==="unauthorized"){
        throw new Error("unauthorized");
      }
      return j;
    });
}

// queued api — guarantees eventual delivery
// 'get' requests are NOT queued (they're read-only and need fresh data)
function api(p){
  if(p.action==="get"){return rawApi(p);}
  // enqueue the write first
  var item={id:uid(),params:p,ts:Date.now(),attempts:0};
  S.syncQueue.push(item);
  saveQueue();
  // try immediately; if it fails, it stays in queue
  processQueue();
  return Promise.resolve({ok:true,queued:true});
}

function processQueue(){
  if(S.queueProcessing||!S.syncQueue.length)return;
  if(!S.online||!S.connected){R();return;}
  S.queueProcessing=true;R();

  var item=S.syncQueue[0];
  item.attempts=(item.attempts||0)+1;

  rawApi(item.params).then(function(r){
    if(r&&r.ok){
      // success — remove from queue
      S.syncQueue.shift();
      saveQueue();
      S.queueProcessing=false;
      if(S.syncQueue.length){processQueue();}
      else{R();}
    }else{
      throw new Error(r&&r.error||"unknown");
    }
  }).catch(function(err){
    S.queueProcessing=false;
    // if unauthorized, stop processing until user fixes it
    if(String(err.message||err).indexOf("unauthorized")>=0){
      toast("⚠ Auth failed — check your token");
      R();return;
    }
    // after 10 attempts, give up on this item so queue isn't stuck
    if(item.attempts>=10){
      console.warn("Queue item failed 10x, dropping:",item);
      S.syncQueue.shift();
      saveQueue();
      toast("⚠ One change couldn't sync");
    }
    R();
    // retry after backoff
    setTimeout(processQueue,Math.min(30000,1000*Math.pow(2,item.attempts)));
  });
}

// network listeners
window.addEventListener("online",function(){S.online=true;R();processQueue();});
window.addEventListener("offline",function(){S.online=false;R();});
// periodic retry
setInterval(function(){if(S.online&&S.connected&&S.syncQueue.length)processQueue();},30000);

function syncResponse(r){
  if(r.ok){
    S.data=cleanData(r.data||[]);
    if(Array.isArray(r.pending)){
      S.pending=r.pending.map(function(d){
        d.amount=num(d.amount);
        d.remaining=d.remaining!==undefined?num(d.remaining):d.amount;
        d.payments=Array.isArray(d.payments)?d.payments:[];
        return d;
      });
      savePending();
    }
  }
}
function load(){
  if(!S.online){toast("You're offline");return;}
  S.syncing=true;R();
  rawApi({action:"get"}).then(function(r){
    syncResponse(r);
    S.syncing=false;R();
    toast("✓ Synced");
    processQueue();
  }).catch(function(err){
    S.syncing=false;R();
    if(String(err.message||err).indexOf("unauthorized")>=0){
      toast("⚠ Auth failed — check token");
    }else{
      toast("Sync failed ⚠");
    }
  });
}
function conn(){
  if(!S.url.trim()){S.status="fail";R();return;}
  S.status="testing";R();
  var urlClean=S.url.trim();
  var tokenClean=(S.token||"").trim();
  var params=new URLSearchParams({action:"get",token:tokenClean}).toString();
  fetch(urlClean+"?"+params).then(function(r){return r.json();}).then(function(d){
    if(d&&d.ok){
      S.status="ok";S.connected=true;
      syncResponse(d);
      localStorage.setItem("ex_url",urlClean);
      localStorage.setItem("ex_token",tokenClean);
      toast("Connected! 🎉");
      processQueue();
    }else if(d&&d.error==="unauthorized"){
      S.status="auth_fail";
    }else{
      S.status="fail";
    }
    R();
  }).catch(function(){S.status="fail";R();});
}

  var d=S.pending[idx];
  var remaining=num(d.remaining!==undefined?d.remaining:d.amount);
  var alreadyApplied=0;
  (d.payments||[]).forEach(function(p){if(p.applied&&!p.isAddition)alreadyApplied+=num(p.amount);});
  var toApply=remaining;

  var msg="Mark as fully settled?\n\n";
  if(alreadyApplied>0)msg+="Already in balance: "+fmt(alreadyApplied)+"\n";
  msg+="Will add to balance now: "+fmt(toApply);
  if(!confirm(msg))return;

  if(toApply>0){
    if(d.type==="owe_me"){
      var e1={id:uid(),amount:toApply,category:"other_inc",desc:"Settled: "+d.person,date:td(),ts:Date.now(),type:"income"};
      S.data.push(e1);

      api({action:"add",id:e2.id,amount:e2.amount,category:e2.category,desc:e2.desc,date:e2.date,type:"expense"});
    }
  }
  S.pending.splice(idx,1);
  savePending();
  api({action:"delete_debt",id:id});
  S.modal=null;R();toast("Debt settled ✓");
}

function openEditDebt(id){

function saveEditDebt(){
  var amtEl=document.getElementById('modal-amount');
  var personEl=document.getElementById('edit-debt-person');
  var noteEl=document.getElementById('edit-debt-note');
  if(amtEl&&amtEl.value)S.editDebtForm.amount=amtEl.value;
  if(personEl)S.editDebtForm.person=personEl.value;
  if(noteEl)S.editDebtForm.desc=noteEl.value;
  var f=S.editDebtForm;
  var errA=validAmount(f.amount);
  if(errA){S.formError=errA;R();return;}
  if(!f.person||!f.person.trim()){S.formError="Person name is required";R();return;}
  var errP=validText(f.person,100);
  if(errP){S.formError=errP;R();return;}
  var errT=validText(f.desc,200);
  if(errT){S.formError=errT;R();return;}
  S.formError="";
  var idx=findDebt(f.id);
  if(idx===-1)return;
  var d=S.pending[idx];
  var oldAmount=d.amount;
  var newAmount=num(f.amount);
  var diff=newAmount-oldAmount;
  d.person=f.person.trim();
  d.amount=newAmount;
  d.remaining=Math.max(0,d.remaining+diff);
  d.type=f.type;
  d.desc=f.desc;
  savePending();
  syncDebtToServer(d);
  S.modal=null;R();toast("Debt updated ✓");
}

// ── NEW: Edit/Delete individual payment entries ──
function openEditPay(debtId,payIdx){
  var idx=findDebt(debtId);
  if(idx===-1)return;
  var d=S.pending[idx];
  var p=d.payments[payIdx];
  if(!p)return;
  var noteClean=(p.note||"").replace(/\s*\[.*?\]/g,"").trim();
  S.editPayForm={debtId:debtId,payIdx:payIdx,amount:String(p.amount),note:noteClean,date:p.date||td(),isAddition:!!p.isAddition};
  S.modal="editpay";R();
}

function saveEditPay(){
  var amtEl=document.getElementById('modal-amount');
  var noteEl=document.getElementById('editpay-note');
  var dateEl=document.getElementById('editpay-date');
  if(amtEl&&amtEl.value)S.editPayForm.amount=amtEl.value;
  if(noteEl)S.editPayForm.note=noteEl.value;
  if(dateEl)S.editPayForm.date=dateEl.value;

  var f=S.editPayForm;
  var errA=validAmount(f.amount);
  if(errA){S.formError=errA;R();return;}
  var errD=validDate(f.date);
  if(errD){S.formError=errD;R();return;}
  var errT=validText(f.note,200);
  if(errT){S.formError=errT;R();return;}
  S.formError="";
  var idx=findDebt(f.debtId);
  if(idx===-1)return;
  var d=S.pending[idx];
  var p=d.payments[f.payIdx];
  if(!p)return;

  var newAmt=num(f.amount);
  var oldAmt=num(p.amount);

  p.amount=newAmt;
  p.date=f.date;
  p.note=f.note+(p.isAddition?"  [+added to debt]":"");

  // recalculate remaining
  recalcRemaining(d);

  savePending();
  syncDebtToServer(d);
  S.modal=null;R();toast("Payment updated ✓");
}

function delPayEntry(debtId,payIdx){
  if(!confirm("Delete this payment entry?"))return;
  var idx=findDebt(debtId);
  if(idx===-1)return;
  var d=S.pending[idx];
  var p=d.payments[payIdx];
  if(!p)return;

  // if it was an addition, subtract from total amount
  if(p.isAddition){
    d.amount=Math.max(0,d.amount-num(p.amount));
  }

  d.payments.splice(payIdx,1);
  recalcRemaining(d);

  savePending();
  syncDebtToServer(d);
  R();toast("Payment entry deleted");
}

function lastDep(){
  var incs=getI();if(!incs.length)return null;
  incs.sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  var last=incs[0];var spent=0;var exps=getE();
  for(var i=0;i<exps.length;i++){if(exps[i].date>=last.date)spent+=num(exps[i].amount);}
  return{amount:last.amount,remaining:last.amount-spent,date:last.date,desc:last.desc};
}
function weekData(){
  var days=[];
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.toISOString().slice(0,10);var s=0;
    getE().forEach(function(e){if(e.date===ds)s+=num(e.amount);});
    days.push({l:DN[d.getDay()],e:s,today:i===0,ds:ds});
  }
  return days;
}

        '<label class="lb">Type</label>'+
        '<div class="stats" style="margin-bottom:0">'+
        '<button class="st" style="cursor:pointer;border:2px solid '+(S.debtForm.type==="owe_me"?"var(--green)":"var(--border)")+';background:'+(S.debtForm.type==="owe_me"?"var(--green-dim)":"var(--card)")+'" onclick="S.debtForm.type=\'owe_me\';R()"><div class="sl">🤝</div><div class="sv" style="font-size:12px">They owe me</div></button>'+
        '<button class="st" style="cursor:pointer;border:2px solid '+(S.debtForm.type==="owe_them"?"var(--red)":"var(--border)")+';background:'+(S.debtForm.type==="owe_them"?"var(--red-dim)":"var(--card)")+'" onclick="S.debtForm.type=\'owe_them\';R()"><div class="sl">💸</div><div class="sv" style="font-size:12px">I owe them</div></button>'+
        '</div>'+
        '<label class="lb">Person</label>'+
        '<input class="inp-sm" id="debt-person" type="text" placeholder="Name" value="'+S.debtForm.person+'">'+
        '<label class="lb">Amount</label>'+
        '<input class="inp-big" id="modal-amount" type="number" inputmode="decimal" placeholder="0.00" value="'+S.debtForm.amount+'">'+
        '<label class="lb">Note</label>'+
        '<input class="inp-sm" id="debt-note" type="text" placeholder="What for?" value="'+S.debtForm.desc+'">'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+'<button class="btn btn-i" onclick="addDebt()">Save Debt</button>';
    }
    else if(S.modal==="partial"){
      var pd=S.pending.find(function(x){return x.id===S.partialForm.id;});
      var pdRemaining=pd?num(pd.remaining!==undefined?pd.remaining:pd.amount):0;
      var isCredit=pd&&pd.type==="owe_me";
      md='<div class="md-h"><h3>Record Payment</h3><button class="md-close" onclick="S.modal=null;S.formError=\'\';R()">✕</button></div>';
      if(pd){
        md+='<div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">'+
          '<div><div style="font-size:11px;color:var(--txt3)">Remaining balance</div>'+
          '<div style="font-family:\'Space Grotesk\',sans-serif;font-size:22px;font-weight:800;color:'+(isCredit?"var(--green)":"var(--red)")+'">'+fmt(pdRemaining)+'</div></div>'+
          '<div style="font-size:13px;font-weight:600">'+pd.person+'</div></div>';
      }
      md+='<label class="lb">Amount paid</label>'+
        '<input class="inp-big" id="modal-amount" type="number" inputmode="decimal" placeholder="0.00" value="'+S.partialForm.amount+'">'+
        '<label class="lb">Date</label>'+
        '<input class="inp-sm" id="pay-date" type="date" value="'+S.partialForm.date+'">'+
        '<label class="lb">Note (optional)</label>'+
        '<input class="inp-sm" id="pay-note" type="text" placeholder="Note (optional)" value="'+S.partialForm.note+'">';

      var toggleColor=isCredit?"var(--green)":"var(--red)";
      var toggleLabel=isCredit?"Add to my income (main balance)":"Deduct from my expenses (main balance)";
      md+='<label style="display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:12px;padding:13px 14px;margin-top:12px;cursor:pointer">'+
        '<input type="checkbox" id="apply-toggle" style="width:18px;height:18px;accent-color:'+toggleColor+';cursor:pointer" '+(S.partialForm.applyNow?"checked":"")+'>'+
        '<div><div style="font-size:13px;font-weight:600;color:'+toggleColor+'">'+toggleLabel+'</div>'+
        '<div style="font-size:10px;color:var(--txt3);margin-top:2px">Check to apply this amount to your main balance now</div></div>'+
        '</label>'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+
        '<button class="btn '+(isCredit?"btn-i":"btn-e")+'" onclick="addPartialPay()">Save Payment</button>';
    }
    else if(S.modal==="addtodebt"){
      var atd=S.pending.find(function(x){return x.id===S.addToDebtForm.id;});
      var atdIsCredit=atd&&atd.type==="owe_me";
      md='<div class="md-h"><h3>Add to Debt</h3><button class="md-close" onclick="S.modal=null;S.formError=\'\';R()">✕</button></div>';
      if(atd){
        md+='<div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">'+
          '<div>'+
          '<div style="font-size:11px;color:var(--txt3)">Current total debt</div>'+
          '<div style="font-family:\'Space Grotesk\',sans-serif;font-size:22px;font-weight:800;color:'+(atdIsCredit?"var(--green)":"var(--red)")+'">'+fmt(atd.amount)+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
          '<div style="font-size:13px;font-weight:700">'+atd.person+'</div>'+
          '<div style="font-size:10px;color:var(--txt3);margin-top:2px">Remaining: '+fmt(atd.remaining)+'</div>'+
          '</div></div>';
      }
      md+='<label class="lb">Amount to add</label>'+
        '<input class="inp-big" id="modal-amount" style="border-color:var(--blue)" type="number" inputmode="decimal" placeholder="0.00" value="'+S.addToDebtForm.amount+'">'+
        '<label class="lb">Date</label>'+
        '<input class="inp-sm" id="add-date" type="date" value="'+S.addToDebtForm.date+'">'+
        '<label class="lb">Note (optional)</label>'+
        '<input class="inp-sm" id="add-note" type="text" placeholder="Note (optional)" value="'+S.addToDebtForm.note+'">';
      var atdLabel=atdIsCredit
        ?"Deduct this amount from my balance (I gave them more)"
        :"Add this amount to my income (they gave me more)";
      md+='<label style="display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:12px;padding:13px 14px;margin-top:12px;cursor:pointer">'+
        '<input type="checkbox" id="add-apply-toggle" style="width:18px;height:18px;accent-color:var(--blue);cursor:pointer" '+(S.addToDebtForm.applyNow?"checked":"")+'>'+
        '<div><div style="font-size:13px;font-weight:600;color:var(--blue)">'+atdLabel+'</div>'+
        '<div style="font-size:10px;color:var(--txt3);margin-top:2px">Check to apply to your main balance now</div></div>'+
        '</label>'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+'<button class="btn" style="background:var(--blue);color:#fff;margin-top:12px" onclick="addToDebt()">Add to Debt</button>';
    }
    // ── Edit Debt Modal ──
    else if(S.modal==="editdebt"){
      var edf=S.editDebtForm;
      md='<div class="md-h"><h3>Edit Debt</h3><button class="md-close" onclick="S.modal=null;S.formError=\'\';R()">✕</button></div>'+
        '<label class="lb">Type</label>'+
        '<div class="stats" style="margin-bottom:0">'+
        '<button class="st" style="cursor:pointer;border:2px solid '+(edf.type==="owe_me"?"var(--green)":"var(--border)")+';background:'+(edf.type==="owe_me"?"var(--green-dim)":"var(--card)")+'" onclick="S.editDebtForm.type=\'owe_me\';R()"><div class="sl">🤝</div><div class="sv" style="font-size:12px">They owe me</div></button>'+
        '<button class="st" style="cursor:pointer;border:2px solid '+(edf.type==="owe_them"?"var(--red)":"var(--border)")+';background:'+(edf.type==="owe_them"?"var(--red-dim)":"var(--card)")+'" onclick="S.editDebtForm.type=\'owe_them\';R()"><div class="sl">💸</div><div class="sv" style="font-size:12px">I owe them</div></button>'+
        '</div>'+
        '<label class="lb">Person</label>'+
        '<input class="inp-sm" id="edit-debt-person" type="text" placeholder="Name" value="'+edf.person+'">'+
        '<label class="lb">Total Amount</label>'+
        '<input class="inp-big" id="modal-amount" type="number" inputmode="decimal" placeholder="0.00" value="'+edf.amount+'">'+
        '<label class="lb">Note</label>'+
        '<input class="inp-sm" id="edit-debt-note" type="text" placeholder="What for?" value="'+edf.desc+'">'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+'<button class="btn btn-i" onclick="saveEditDebt()">Save Changes</button>'+
        '<button class="btn btn-del" onclick="delDebt(\''+edf.id+'\')">🗑 Delete Debt</button>';
    }
    // ── Edit Payment Entry Modal ──
    else if(S.modal==="editpay"){
      var epf=S.editPayForm;
      var epDebt=S.pending.find(function(x){return x.id===epf.debtId;});
      md='<div class="md-h"><h3>Edit '+(epf.isAddition?"Addition":"Payment")+'</h3><button class="md-close" onclick="S.modal=null;S.formError=\'\';R()">✕</button></div>';
      if(epDebt){
        md+='<div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:4px;text-align:center">'+
          '<div style="font-size:11px;color:var(--txt3)">'+epDebt.person+'</div></div>';
      }
      md+='<label class="lb">Amount</label>'+
        '<input class="inp-big" id="modal-amount" type="number" inputmode="decimal" value="'+epf.amount+'">'+
        '<label class="lb">Date</label>'+
        '<input class="inp-sm" id="editpay-date" type="date" value="'+epf.date+'">'+
        '<label class="lb">Note</label>'+
        '<input class="inp-sm" id="editpay-note" type="text" placeholder="Note (optional)" value="'+epf.note+'">'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+'<button class="btn btn-i" onclick="saveEditPay()">Save Changes</button>'+
        '<button class="btn btn-del" onclick="delPayEntry(\''+epf.debtId+'\','+epf.payIdx+');S.modal=null;R()">🗑 Delete Entry</button>';
    }
    else if(S.modal==="edit"){
      var f=S.editForm;
      var isI=f.type==="income";
      var isCCpay=f.type==="cc_payment";
      var isExpType=!isI&&!isCCpay;
      var editPm=f.pm||"cash";
      var editTitle=isCCpay?"CC Payment":isI?"Income":"Expense";

      md='<div class="md-h"><h3>Edit '+editTitle+'</h3><button class="md-close" onclick="S.modal=null;S.formError=\'\';R()">✕</button></div>'+
        '<input class="inp-big '+(isI?"inc-b":isCCpay?"":"exp-b")+'" id="modal-amount" type="number" inputmode="decimal" value="'+f.amount+'"'+(isCCpay?' style="border-color:var(--purple)"':'')+'>'; 

      // payment method selector for expense types (not income, not cc_payment)
      if(isExpType&&S.ccEnabled){
        md+='<label class="lb">Payment Method</label>'+
          '<div class="pm-sel">'+
          '<button class="pm-btn pm-cash'+(editPm==="cash"?" pm-on":"")+'" onclick="S.editForm.pm=\'cash\';R()"><span class="pm-ic">💵</span>Cash</button>'+
          '<button class="pm-btn'+(editPm==="debit"?" pm-on":"")+'" onclick="S.editForm.pm=\'debit\';R()"><span class="pm-ic">🏧</span>Debit</button>'+
          '<button class="pm-btn'+(editPm==="credit"?" pm-on":"")+'" onclick="S.editForm.pm=\'credit\';R()"><span class="pm-ic">💳</span>Credit</button>'+
          '<button class="pm-btn'+(editPm==="ewallet"?" pm-on":"")+'" onclick="S.editForm.pm=\'ewallet\';R()"><span class="pm-ic">📱</span>E-Wallet</button>'+
          '</div>';
        if(editPm==="credit"){
          md+='<div style="font-size:10px;color:var(--purple);padding:4px 6px;background:var(--purple-dim);border-radius:8px;margin-bottom:4px">💡 CC charge — adds to liability, not deducted from cash.</div>';
        }
      }

      if(!isCCpay){
        md+='<label class="lb">Category</label>'+mkCats(isI?IC:EC,f.cat,"S.editForm.cat")+
          '<label class="lb">Description</label>'+
          '<input class="inp-sm" id="modal-desc" type="text" value="'+f.desc+'">';
      }else{
        md+='<div style="background:var(--bg3);border-radius:10px;padding:10px;margin:8px 0;font-size:11px;color:var(--txt3);line-height:1.5">'+
          '💳 CC bill payment — reduces cash and clears CC liability.<br>Deleting this will restore cash and bring back the liability.</div>';
      }
      md+='<label class="lb">Date</label>'+
        '<input class="inp-sm" type="date" value="'+f.date+'" onchange="S.editForm.date=this.value">'+
        (S.formError?'<div class="form-err">'+S.formError+'</div>':'')+
        '<button class="btn '+(isI?"btn-i":isCCpay?"\" style=\"background:var(--purple);color:#fff":"btn-e")+'" onclick="updEnt()">Update</button>'+
        '<button class="btn btn-del" onclick="delEnt(\''+f.id+'\')">🗑 Delete Entry</button>';
    }

    h+='<div class="ov" onclick="if(event.target===this){S.modal=null;S.formError="";R()}"><div class="md">'+md+'</div></div>';
  }

  app.innerHTML=h;
}

// ── INIT ──
if(S.url&&S.token&&localStorage.getItem("ex_url")&&localStorage.getItem("ex_token")){conn();}else{R();}
</script>
</body>
</html>
